server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3006/emr_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:Brady}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=false

# Base64-encoded 256-bit (32-byte) secret. Replace for production.
app.jwt.secret=Y29kZXgtZW1yLWRlbW8tc2VjcmV0LWtleS0zMi1ieXRlcw==
app.jwt.ttlSeconds=28800

logging.level.org.springframework.security=INFO
